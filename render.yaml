services:
  - type: web
    name: spring-weather-broadcast
    runtime: docker
    repo: https://github.com/eperoni76/spring-weather-broadcast
    branch: main
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt # o oregon, singapore

    # Variabili d'ambiente
    envVars:
      - key: PORT
        value: 8080

      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Firebase Configuration
      - key: FIREBASE_DATABASE_URL
        sync: false # Configura manualmente

      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false # Configura manualmente (base64 encoded)

      # Mail Configuration
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com

      - key: SPRING_MAIL_PORT
        value: 587

      - key: SPRING_MAIL_USERNAME
        sync: false

      - key: SPRING_MAIL_PASSWORD
        sync: false

      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
        value: true

      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
        value: true

      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_CONNECTIONTIMEOUT
        value: 10000

      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_TIMEOUT
        value: 10000

      - key: SPRING_MAIL_PROPERTIES_MAIL_SMTP_WRITETIMEOUT
        value: 10000

      - key: NEWSLETTER_MAIL_FROM
        sync: false

      # CORS Configuration
      - key: CORS_ALLOWED_ORIGINS
        value: https://weather-broadcast-pwa.firebaseapp.com,https://weather-broadcast-pwa.web.app,http://localhost:4200

      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m -Dio.grpc.netty.shaded.io.netty.handler.ssl.noOpenSsl=true -Dio.netty.handler.ssl.noOpenSsl=true"

    # Health check
    healthCheckPath: /api/health

    # Auto deploy on push
    autoDeploy: true
