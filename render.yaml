services:
  - type: web
    name: spring-weather-broadcast
    runtime: docker
    repo: https://github.com/eperoni76/spring-weather-broadcast
    branch: main
    dockerfilePath: ./Dockerfile
    plan: free
    region: frankfurt # o oregon, singapore

    # Variabili d'ambiente
    envVars:
      - key: PORT
        value: 8080

      - key: SPRING_PROFILES_ACTIVE
        value: prod

      # Firebase Configuration
      - key: FIREBASE_DATABASE_URL
        sync: false # Configura manualmente

      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false # Configura manualmente (base64 encoded)

      # CORS Configuration
      - key: CORS_ALLOWED_ORIGINS
        value: https://weather-broadcast-pwa.firebaseapp.com

      - key: JAVA_OPTS
        value: "-Xmx512m -Xms256m"

    # Health check
    healthCheckPath: /api/health

    # Auto deploy on push
    autoDeploy: true
