# ================================================================
# FILE DI ESEMPIO - Committabile su Git
# Copia questo file e rinominalo secondo l'ambiente:
# - application-local.properties (sviluppo, NON committare)
# - application.properties (attivo, NON committare)
# ================================================================

# Application
spring.application.name=spring-weather-broadcast
server.port=8080

# Firebase Configuration
# Scarica firebase-service-account.json dalla Firebase Console
# Project: weather-broadcast-pwa
firebase.service-account-path=classpath:firebase-service-account.json
firebase.database-url=https://YOUR-PROJECT-ID-default-rtdb.firebaseio.com

# Newsletter Delivery Configuration (Resend API)
newsletter.resend.api-key=YOUR_RESEND_API_KEY
newsletter.mail-from=Il Crima <newsletter@send.ilcrima.it>

# Logging
logging.level.root=INFO
logging.level.com.weatherbroadcast=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS Configuration (frontend URLs)
cors.allowed-origins=http://localhost:4200,https://weather-broadcast-pwa.firebaseapp.com
