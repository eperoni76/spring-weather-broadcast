# ================================================================
# CONFIGURAZIONE PRODUZIONE - Template per Render/Cloud
# Tutte le variabili vengono da Environment Variables
# NON inserire valori di default sensibili qui
# ================================================================

# Application
spring.application.name=spring-weather-broadcast

# Server (Render inietta automaticamente PORT)
server.port=${PORT}

# Firebase Configuration (OBBLIGATORIO da env variables)
firebase.service-account-json=${FIREBASE_SERVICE_ACCOUNT_JSON}
firebase.database-url=${FIREBASE_DATABASE_URL}

# Mail Configuration (OBBLIGATORIO da env variables)
spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
newsletter.mail-from=${NEWSLETTER_MAIL_FROM:${SPRING_MAIL_USERNAME}}

# Logging (production)
logging.level.root=INFO
logging.level.com.weatherbroadcast=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
